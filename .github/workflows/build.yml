name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller customtkinter
    
    - name: Build EXE
      run: pyinstaller --onefile --windowed --name "NetworkToolUltimate" network_tool.py
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: NetworkTool-Windows
        path: dist/*.exe
